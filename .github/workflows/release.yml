name: Release

on:
  push:
    tags:
      - "v*"
      - "cli-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FLOO_RELEASE_VERSION: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: floo-x86_64-apple-darwin
            binary: floo-local
          - target: aarch64-apple-darwin
            os: macos-latest
            name: floo-aarch64-apple-darwin
            binary: floo-local
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: floo-x86_64-unknown-linux-musl
            binary: floo-local
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: floo-aarch64-unknown-linux-musl
            binary: floo-local
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: floo-x86_64-pc-windows-msvc
            binary: floo-local.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.name }}.exe"
          $hash = (Get-FileHash "${{ matrix.name }}.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}.exe" | Out-File -Encoding ascii "${{ matrix.name }}.exe.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}*
          # Hard-fail if the binary or its .sha256 companion is missing.
          # The CLI's updater verifies checksums, so silently publishing a
          # binary without its sha would break installs for every user.
          if-no-files-found: error
          # Allow "re-run failed jobs" to replace an existing artifact from
          # a prior partial run, rather than erroring on immutable-name
          # collisions (default behavior since upload-artifact@v4).
          overwrite: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Sign release artifacts
        env:
          FLOO_RELEASE_SIGNING_KEY: ${{ secrets.FLOO_RELEASE_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${FLOO_RELEASE_SIGNING_KEY}" ]]; then
            echo "FLOO_RELEASE_SIGNING_KEY is required to publish signed CLI releases." >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/floo-release-signing-key.pem"
          public_key_path="${RUNNER_TEMP}/floo-release-signing-public-key.pem"
          expected_public_key_path="${RUNNER_TEMP}/floo-release-expected-public-key.pem"
          printf '%s\n' "${FLOO_RELEASE_SIGNING_KEY}" >"${key_path}"
          chmod 600 "${key_path}"
          openssl rsa -RSAPublicKey_out -in "${key_path}" -out "${public_key_path}"
          cat >"${expected_public_key_path}" <<'PEM'
          -----BEGIN RSA PUBLIC KEY-----
          MIIBigKCAYEAoxTcA648/UUTEcmZbiZbwGsQJIjI/CwEda/3Zwky26hOdu3ccQKD
          U3lXj7c/cAvr0Y+ISnf23YvBr68q0kI0IhihYE74MoOKe0QjRv7aK0cYgIWKj5SZ
          xcw0CLvMm36rNG7iZBHJb3Jbew5ebMpaRyCZBnruHQocHQammzUkuDjeJ753ZFmu
          Y8Fyr/CLO+F2V7Bou/qh4DA0tJ8Ams4HLTUGAfXHgj3Q5L9DIZC6iDzGqg70DblC
          wNrr/n+zx6TCjonKraYxDUXruR6Za6XrKSbTrq6Bh1DFYK5DM3m9OIdiMx2EC+yD
          3iY/CZRC/auqq4CQeXLQyxTsExxnvG3O4Ci77MTZH4NSnngkkw5KrcvqCC9KVI9J
          IViei4zB3GoTGDm9+FC02cCozhKiTvAqzdb+ieszMNsavQNdOy1qO9bQfObWWvay
          Z4rrRM3hE+rKyk5WHrPZcR77YiqZ6cwXVl7g8gJ0JIQi2a8oHzmjQc7n+j1Nmglh
          Wk6BmNyJThezAgMBAAE=
          -----END RSA PUBLIC KEY-----
          PEM
          if ! cmp -s "${expected_public_key_path}" "${public_key_path}"; then
            echo "FLOO_RELEASE_SIGNING_KEY does not match the public key pinned into the CLI." >&2
            exit 1
          fi

          found=0
          while IFS= read -r -d '' asset; do
            case "${asset}" in
              *.sha256|*.sig) continue ;;
            esac
            found=1
            openssl dgst -sha256 -sign "${key_path}" -out "${asset}.sig" "${asset}"
            openssl dgst -sha256 -verify "${public_key_path}" -signature "${asset}.sig" "${asset}"
          done < <(find floo-* -type f -name 'floo-*' -print0)

          if [[ "${found}" -ne 1 ]]; then
            echo "No release binaries found to sign." >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            floo-*/*
          generate_release_notes: true
          # Hard-fail if the glob matches zero files. Default is false,
          # which would silently publish a release with zero assets if the
          # artifact download ever breaks or the directory layout shifts.
          # The CLI auto-updater depends on these assets existing.
          fail_on_unmatched_files: true

      # Post a release-success ping to Slack #releases. Mirrors the
      # platform's `Notify release success` step in
      # getfloo/floo's deploy.yml so the CLI shows up alongside platform
      # releases in the same paper trail.
      #
      # Public-repo safety: this repo is open-source. The webhook URL
      # MUST come from `secrets.SLACK_RELEASES_WEBHOOK` and never be
      # hardcoded. GitHub Actions does not inject `secrets.*` into
      # workflow runs from fork PRs, so the only way this step ever
      # runs is via `push: tags` (org-member push) or `workflow_dispatch`
      # (org-member trigger). The message body carries only public
      # information (tag, short SHA, public release URL, public run URL).
      #
      # If `SLACK_RELEASES_WEBHOOK` isn't configured (e.g. a fork that
      # cuts its own tag) the step skips with a warning instead of
      # failing the release — the binaries are already published.
      - name: Notify release success
        if: success()
        env:
          SLACK_RELEASES_WEBHOOK: ${{ secrets.SLACK_RELEASES_WEBHOOK }}
        run: |
          set -euo pipefail
          if [ -z "$SLACK_RELEASES_WEBHOOK" ]; then
            echo "::warning::SLACK_RELEASES_WEBHOOK is empty; skipping"
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG=":package: *floo-cli ${TAG} released*\nCommit: \`${SHORT_SHA}\` · <${RELEASE_URL}|GitHub release> · <${RUN_URL}|build run>"
          PAYLOAD=$(jq -nc --arg text "$MSG" '{text:$text}')
          RESPONSE=$(curl -sSL --fail-with-body -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_RELEASES_WEBHOOK")
          if [ "$RESPONSE" != "ok" ]; then
            echo "::error::Slack webhook returned unexpected body: $RESPONSE"
            exit 1
          fi
