name: Release

on:
  push:
    tags:
      - "v*"
      - "cli-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FLOO_RELEASE_VERSION: ${{ github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: floo-x86_64-apple-darwin
            binary: floo-local
          - target: aarch64-apple-darwin
            os: macos-latest
            name: floo-aarch64-apple-darwin
            binary: floo-local
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: floo-x86_64-unknown-linux-musl
            binary: floo-local
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: floo-aarch64-unknown-linux-musl
            binary: floo-local
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: floo-x86_64-pc-windows-msvc
            binary: floo-local.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-musl'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.name }}
          shasum -a 256 ${{ matrix.name }} > ${{ matrix.name }}.sha256

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.name }}.exe"
          $hash = (Get-FileHash "${{ matrix.name }}.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}.exe" | Out-File -Encoding ascii "${{ matrix.name }}.exe.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ matrix.name }}*
          # Hard-fail if the binary or its .sha256 companion is missing.
          # The CLI's updater verifies checksums, so silently publishing a
          # binary without its sha would break installs for every user.
          if-no-files-found: error
          # Allow "re-run failed jobs" to replace an existing artifact from
          # a prior partial run, rather than erroring on immutable-name
          # collisions (default behavior since upload-artifact@v4).
          overwrite: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            floo-*/*
          generate_release_notes: true
          # Hard-fail if the glob matches zero files. Default is false,
          # which would silently publish a release with zero assets if the
          # artifact download ever breaks or the directory layout shifts.
          # The CLI auto-updater depends on these assets existing.
          fail_on_unmatched_files: true
