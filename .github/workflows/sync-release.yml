name: Sync Release from Private Repo

on:
  repository_dispatch:
    types: [new-cli-release]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download binaries from private repo release
        env:
          GH_TOKEN: ${{ secrets.FLOO_PRIVATE_REPO_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          echo "Syncing release: ${TAG}"

          # Download all release assets from the private repo
          gh release download "$TAG" \
            --repo getfloo/floo \
            --dir ./binaries \
            --pattern 'floo-*'

          ls -la ./binaries/

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          VERSION="${TAG#cli-}"  # Strip 'cli-' prefix

          gh release create "$VERSION" \
            --title "Floo CLI $VERSION" \
            --generate-notes \
            ./binaries/*
