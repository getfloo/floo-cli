name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Superseded runs on the same PR are wasted minutes — cancel them. Push runs
# on main are never cancelled (each merge gets its full verdict).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  # Suspected trigger for the corrupt test-harness class (floo-cli#204) is
  # incremental-compilation state; CI gains nothing from incremental (the
  # target/ cache would otherwise preserve a corrupt artifact forever).
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check script syntax
        run: bash -n install.sh && bash -n scripts/test

      - name: Run installer script tests
        run: bash tests/install_script_test.sh

      - name: Run installer script e2e
        run: bash tests/install_script_e2e.sh

      - name: Run test-harness guard tests
        run: bash tests/test_script_test.sh

      # fmt + clippy + cargo test via the canonical entry point, which also
      # self-heals the corrupt-harness artifact class (floo-cli#204) that the
      # target/ cache would otherwise pin across runs.
      - name: Run fmt, clippy, and tests
        run: ./scripts/test

  # Informational, not a merge gate: tarpaulin (compiled from source each run)
  # is too slow for the PR lane, so it tracks coverage on merges only. Keeping
  # it out of pr-check's `needs` is deliberate — see the speed targets in the
  # monorepo's docs/knowledge/domains/testing.md.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: cargo tarpaulin --out stdout --skip-clean

  # Aggregated status for branch protection — the ONE required context, same
  # name and role as the monorepo's pr-check.yml summary job, so
  # scripts/ops/configure-branch-protection.sh (in getfloo/floo) protects both
  # repos with the same required-check list. To add a merge gate, add the job
  # to `needs:` and its result to the assertion — the context name never
  # changes. `coverage` is intentionally absent (informational lane, above).
  pr-check:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: report
        run: |
          echo "test: ${{ needs.test.result }}"
          [ "${{ needs.test.result }}" = "success" ]
